<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klasifikasi Data Tabular - KNN</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body */
body{
    font-family:"Times New Roman", serif;
    background:#f4ecd8;
    color:#3e2f1c;
    padding:20px;
}

/* Navbar */
.navbar{
    background:#5c4033;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-size:18px;
    margin:0 15px;
}

.navbar a:hover{
    text-decoration:underline;
}

/* Judul */
h1{
    text-align:center;
    color:#5c4033;
    margin-bottom:25px;
}

/* Container */
.container{
    background:#fffaf0;
    border:2px solid #c2a27c;
    border-radius:10px;
    padding:25px;

    max-width:1000px;
    margin:auto;

    box-shadow:4px 4px 10px rgba(0,0,0,0.15);
}

/* Heading */
h2{
    margin-bottom:15px;
    color:#5c4033;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    margin:15px 0;
}

th{
    background:#5c4033;
    color:white;
    padding:10px;
}

td{
    border:1px solid #c2a27c;
    padding:8px;
    text-align:center;
}

tr:nth-child(even){
    background:#f3e5d0;
}

/* Input */
.input-group{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin:20px 0;
}

.input-group label{
    font-weight:bold;
    color:#5c4033;
}

input[type=number]{
    width:130px;
    padding:8px;
    border:2px solid #7b5e57;
    border-radius:5px;
    margin-top:5px;
    font-size:15px;
}

/* Button */
button{
    background:#5c4033;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#3e2f1c;
}

/* Result */
.result{
    margin-top:20px;
    padding:18px;
    border-radius:8px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* Warna klasifikasi */
.setosa{
    background:#dcedc8;
    color:#33691e;
}

.versicolor{
    background:#fff9c4;
    color:#f57f17;
}

.virginica{
    background:#ffccbc;
    color:#bf360c;
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="index.html">Beranda</a>
</div>

<!-- Judul -->
<h1>Klasifikasi Data Tabular dengan KNN</h1>

<!-- Container -->
<div class="container">

    <h2>Dataset Pelatihan Iris</h2>

    <table id="datasetTable"></table>

    <h2>Input Data Baru</h2>

    <div class="input-group">

        <div>
            <label>Panjang Sepal (cm)</label><br>
            <input type="number" id="sepalLength" step="0.1" value="5.0">
        </div>

        <div>
            <label>Lebar Sepal (cm)</label><br>
            <input type="number" id="sepalWidth" step="0.1" value="3.5">
        </div>

        <div>
            <label>Nilai K</label><br>
            <input type="number" id="kValue" value="3" min="1" max="10">
        </div>

    </div>

    <button onclick="classify()">
        Klasifikasikan
    </button>

    <div id="result"></div>

    <div id="neighbors"></div>

</div>

<script>

// Dataset Iris
const dataset = [

[5.1,3.5,"Setosa"],
[4.9,3.0,"Setosa"],
[4.7,3.2,"Setosa"],
[4.6,3.1,"Setosa"],
[5.0,3.6,"Setosa"],
[5.4,3.9,"Setosa"],

[7.0,3.2,"Versicolor"],
[6.4,3.2,"Versicolor"],
[6.9,3.1,"Versicolor"],
[5.5,2.3,"Versicolor"],
[6.5,2.8,"Versicolor"],
[5.7,2.8,"Versicolor"],

[6.3,3.3,"Virginica"],
[5.8,2.7,"Virginica"],
[7.1,3.0,"Virginica"],
[6.3,2.9,"Virginica"],
[6.5,3.0,"Virginica"],
[7.6,3.0,"Virginica"]

];

// Fungsi Euclidean
function euclidean(a,b){

    return Math.sqrt(
        Math.pow(a[0]-b[0],2) +
        Math.pow(a[1]-b[1],2)
    );

}

// Fungsi KNN
function knn(data, point, k){

    let distances = data.map(d => ({

        label:d[2],
        dist:euclidean([d[0],d[1]], point)

    }));

    distances.sort((a,b)=>a.dist-b.dist);

    let neighbors = distances.slice(0,k);

    let votes = {};

    neighbors.forEach(n => {

        votes[n.label] = (votes[n.label] || 0) + 1;

    });

    let winner = Object.keys(votes).reduce((a,b)=>

        votes[a] > votes[b] ? a : b

    );

    return {

        predicted:winner,
        neighbors:neighbors,
        votes:votes

    };

}

// Fungsi klasifikasi
function classify(){

    let sl = parseFloat(
        document.getElementById("sepalLength").value
    );

    let sw = parseFloat(
        document.getElementById("sepalWidth").value
    );

    let k = parseInt(
        document.getElementById("kValue").value
    );

    let result = knn(dataset,[sl,sw],k);

    let cls = result.predicted.toLowerCase();

    document.getElementById("result").innerHTML =

    `<div class="result ${cls}">
        Hasil Prediksi: ${result.predicted}<br>
        Voting: ${JSON.stringify(result.votes)}
    </div>`;

    let nHtml =
    "<h2>K Tetangga Terdekat</h2>" +
    "<table>" +
    "<tr>" +
    "<th>No</th>" +
    "<th>Label</th>" +
    "<th>Jarak</th>" +
    "</tr>";

    result.neighbors.forEach((n,i)=>{

        nHtml +=
        `<tr>
            <td>${i+1}</td>
            <td>${n.label}</td>
            <td>${n.dist.toFixed(4)}</td>
        </tr>`;

    });

    document.getElementById("neighbors").innerHTML =
    nHtml + "</table>";

}

// Render dataset
function renderTable(){

    let t =
    "<tr>" +
    "<th>No</th>" +
    "<th>Panjang Sepal</th>" +
    "<th>Lebar Sepal</th>" +
    "<th>Label</th>" +
    "</tr>";

    dataset.forEach((d,i)=>{

        t +=
        `<tr>
            <td>${i+1}</td>
            <td>${d[0]}</td>
            <td>${d[1]}</td>
            <td>${d[2]}</td>
        </tr>`;

    });

    document.getElementById("datasetTable").innerHTML = t;

}

renderTable();

</script>

</body>
</html>

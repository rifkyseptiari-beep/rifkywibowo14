<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Klasifikasi Data Tabular - KNN</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px;
margin: 0 auto; padding: 20px; background: #f0f4f8; }
h1 { color: #1a237e; text-align: center; }
.container { background: white; padding: 20px;
border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
table { width: 100%; border-collapse: collapse; margin: 10px 0; }
th { background: #1a237e; color: white; padding: 8px; }
td { border: 1px solid #ddd; padding: 7px; text-align: center; }
tr:nth-child(even) { background: #e8eaf6; }
.input-group { display: flex; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
.input-group label { font-weight: bold; color: #1a237e; }
input[type=number] { width: 100px; padding: 6px; border: 2px solid #1a237e;
border-radius: 5px; font-size: 14px; }
button { background: #1a237e; color: white; padding: 10px 25px;
border: none; border-radius: 5px; cursor: pointer; font-size: 15px; }
button:hover { background: #283593; }
.result { margin-top: 15px; padding: 15px; border-radius: 8px;
font-size: 18px; font-weight: bold; text-align: center; }
.setosa { background: #c8e6c9; color: #1b5e20; }
.versicolor { background: #fff9c4; color: #f57f17; }
.virginica { background: #ffccbc; color: #bf360c; }
</style>
</head>
<body>

<nav class="navbar">
        <a href="index.html" class="nav-item">Home</a>
</nav>

<h1>Klasifikasi Data Tabular dengan KNN</h1>
<div class="container">
<h2>Dataset Pelatihan (Iris - 2 Fitur)</h2>
<table id="datasetTable"></table>
 
<h2>Input Data Baru</h2>
<div class="input-group">
<div>
<label>Panjang Sepal (cm):</label><br>
<input type="number" id="sepalLength" step="0.1" value="5.0">
</div>
<div>
<label>Lebar Sepal (cm):</label><br>
<input type="number" id="sepalWidth" step="0.1" value="3.5">
</div>
<div>
<label>Nilai K:</label><br>
<input type="number" id="kValue" value="3" min="1" max="10">
</div>
</div>
<button onclick="classify()">Klasifikasikan!</button>
<div id="result"></div>
<div id="neighbors"></div>
</div>
 
<script>
// Dataset Iris (sebagian) - [panjangSepal, lebarSepal, label]
const dataset = [
[5.1,3.5,"Setosa"],[4.9,3.0,"Setosa"],[4.7,3.2,"Setosa"],
[4.6,3.1,"Setosa"],[5.0,3.6,"Setosa"],[5.4,3.9,"Setosa"],
[7.0,3.2,"Versicolor"],[6.4,3.2,"Versicolor"],[6.9,3.1,"Versicolor"],
[5.5,2.3,"Versicolor"],[6.5,2.8,"Versicolor"],[5.7,2.8,"Versicolor"],
[6.3,3.3,"Virginica"],[5.8,2.7,"Virginica"],[7.1,3.0,"Virginica"],
[6.3,2.9,"Virginica"],[6.5,3.0,"Virginica"],[7.6,3.0,"Virginica"]
];
 
// Fungsi hitung jarak Euclidean
function euclidean(a, b) {
return Math.sqrt(Math.pow(a[0]-b[0],2) + Math.pow(a[1]-b[1],2));
}
 
// Fungsi KNN Classifier
function knn(data, point, k) {
let distances = data.map(d => ({
label: d[2],
dist: euclidean([d[0],d[1]], point)
}));
distances.sort((a,b) => a.dist - b.dist);
let neighbors = distances.slice(0, k);
let votes = {};
neighbors.forEach(n => {
votes[n.label] = (votes[n.label] || 0) + 1;
});
let winner = Object.keys(votes).reduce((a,b) =>
votes[a] > votes[b] ? a : b
);
return { predicted: winner, neighbors: neighbors, votes: votes };
}
 
// Fungsi klasifikasi saat tombol diklik
function classify() {
let sl = parseFloat(document.getElementById("sepalLength").value);
let sw = parseFloat(document.getElementById("sepalWidth").value);
let k = parseInt(document.getElementById("kValue").value);
let result = knn(dataset, [sl, sw], k);
let cls = result.predicted.toLowerCase();
document.getElementById("result").innerHTML =
`<div class="result ${cls}">
Hasil Prediksi: ${result.predicted}`,
(Voting: ${JSON.stringify(result.votes)})
</div>`;
let nHtml = "<h3>K Tetangga Terdekat:</h3><table>"
+ "<tr><th>No</th><th>Label</th><th>Jarak</th></tr>";
result.neighbors.forEach((n,i) => {
nHtml += `<tr><td>${i+1}</td><td>${n.label}</td>
<td>${n.dist.toFixed(4)}</td></tr>`;
});
document.getElementById("neighbors").innerHTML = nHtml + "</table>";
}
 
// Tampilkan tabel dataset
function renderTable() {
let t = "<tr><th>No</th><th>Panjang Sepal</th>"
+ "<th>Lebar Sepal</th><th>Label</th></tr>";
dataset.forEach((d,i) => {
t += `<tr><td>${i+1}</td><td>${d[0]}</td>
<td>${d[1]}</td><td>${d[2]}</td></tr>`;
});
document.getElementById("datasetTable").innerHTML = t;
}
renderTable();
</script>
</body>
</html>

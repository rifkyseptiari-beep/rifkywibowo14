<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Prediksi Harga Rumah - Regresi Linear</title>
<style>
body { font-family: Arial,sans-serif; max-width:960px;
margin:0 auto; padding:20px; background:#f4f6f9; }
h1 { color:#1a237e; text-align:center; }
.card { background:white; border-radius:12px; padding:20px;
margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
canvas { width:100%; border:1px solid #ddd; border-radius:8px; }
input[type=number] { padding:8px; border:2px solid #1a237e;
border-radius:6px; font-size:15px; width:150px; }
button { background:#1a237e; color:white; padding:10px 24px;
border:none; border-radius:6px; cursor:pointer; font-size:15px; }
.result { background:#f4f6f9; padding:14px; border-radius:8px;
margin-top:12px; font-size:17px; font-weight:bold; color:#1a237e; }
.metrics { display:flex; gap:15px; flex-wrap:wrap; margin-top:10px; }
.metric-box { background:#f5f5f5; border-left:4px solid #1a237e;
padding:10px 16px; border-radius:6px; flex:1; min-width:140px; }
.metric-box .val { font-size:20px; font-weight:bold; color:#1a237e; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:#1a237e; color:white; padding:8px; }
td { border:1px solid #ddd; padding:6px; text-align:center; }
tr:nth-child(even) { background:#e0f2f1; }
</style>
</head>
<body>

<nav class="navbar">
        <a href="index.html" class="nav-item">Home</a>
</nav>

<h1>Prediksi Harga Rumah dengan Regresi Linear</h1>
 
<div class="card">
<h2>Visualisasi Regresi</h2>
<canvas id="chart" width="800" height="380"></canvas>
</div>
 
<div class="card">
<h2>Prediksi Harga</h2>
<label>Masukkan Luas Bangunan (m2):</label>&nbsp;
<input type="number" id="inputLuas" value="80" min="10">&nbsp;
<button onclick="predict()">Prediksi!</button>
<div class="result" id="predResult"></div>
</div>
 
<div class="card">
<h2>Evaluasi Model</h2>
<div class="metrics" id="metrics"></div>
</div>
 
<div class="card">
<h2>Dataset Latih</h2>
<table id="dataTable"></table>
</div>
 
<script>
// Dataset: [luas_m2, harga_juta_rp]
const data = [
[36,250],[45,310],[54,380],[72,490],
[90,580],[100,650],[120,780],[144,950],
[160,1050],[200,1300]
];
 
// Hitung koefisien regresi linear (Least Squares)
function linearRegression(data) {
let n = data.length;
let sx = data.reduce((s,d)=>s+d[0], 0);
let sy = data.reduce((s,d)=>s+d[1], 0);
let sxy= data.reduce((s,d)=>s+d[0]*d[1], 0);
let sx2= data.reduce((s,d)=>s+d[0]*d[0], 0);
let b = (n*sxy - sx*sy) / (n*sx2 - sx*sx);
let a = (sy - b*sx) / n;
return { a, b };
}
 
// Evaluasi MSE dan R2
function evaluate(data, a, b) {
let yMean = data.reduce((s,d)=>s+d[1],0) / data.length;
let ssRes = data.reduce((s,d)=>s+Math.pow(d[1]-(a+b*d[0]),2),0);
let ssTot = data.reduce((s,d)=>s+Math.pow(d[1]-yMean,2),0);
let mse = ssRes / data.length;
let r2 = 1 - (ssRes/ssTot);
return { mse, rmse: Math.sqrt(mse), r2 };
}
 
// Gambar grafik di Canvas
function drawChart(a, b) {
let canvas = document.getElementById("chart");
let ctx = canvas.getContext("2d");
let W = canvas.width, H = canvas.height;
let pad = 60;
let xVals = data.map(d=>d[0]), yVals = data.map(d=>d[1]);
let xMin=Math.min(...xVals)-10, xMax=Math.max(...xVals)+20;
let yMin=0, yMax=Math.max(...yVals)+100;
let sx = (x)=> pad + (x-xMin)/(xMax-xMin)*(W-2*pad);
let sy = (y)=> H-pad - (y-yMin)/(yMax-yMin)*(H-2*pad);
ctx.clearRect(0,0,W,H);
// Background
ctx.fillStyle="#fafafa"; ctx.fillRect(0,0,W,H);
// Grid lines
ctx.strokeStyle="#e0e0e0"; ctx.lineWidth=1;
for(let i=0;i<=5;i++){
let y=yMin+i*(yMax-yMin)/5;
ctx.beginPath(); ctx.moveTo(pad,sy(y));
ctx.lineTo(W-pad,sy(y)); ctx.stroke();
ctx.fillStyle="#888"; ctx.font="11px Arial";
ctx.fillText(Math.round(y),4,sy(y)+4);
}
// Axes
ctx.strokeStyle="#333"; ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(pad,pad); ctx.lineTo(pad,H-pad);
ctx.lineTo(W-pad,H-pad); ctx.stroke();
// Axis labels
ctx.fillStyle="#004d40"; ctx.font="bold 12px Arial";
ctx.fillText("Luas (m2)", W/2-30, H-10);
ctx.save(); ctx.translate(14,H/2);
ctx.rotate(-Math.PI/2);
ctx.fillText("Harga (Juta Rp)", -50, 0); ctx.restore();
// Regression line
ctx.strokeStyle="#004d40"; ctx.lineWidth=2.5;
ctx.beginPath();
ctx.moveTo(sx(xMin), sy(a+b*xMin));
ctx.lineTo(sx(xMax), sy(a+b*xMax)); ctx.stroke();
// Data points
data.forEach(d=>{
ctx.beginPath();
ctx.arc(sx(d[0]), sy(d[1]), 7, 0, Math.PI*2);
ctx.fillStyle="#00897b"; ctx.fill();
ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.stroke();
});
// X axis ticks
ctx.fillStyle="#555"; ctx.font="11px Arial";
for(let i=0;i<=5;i++){
let x=xMin+i*(xMax-xMin)/5;
ctx.fillText(Math.round(x), sx(x)-10, H-pad+15);
}
}
 
const reg = linearRegression(data);
const ev = evaluate(data, reg.a, reg.b);
 
// Prediksi
function predict() {
let luas = parseFloat(document.getElementById("inputLuas").value);
if(isNaN(luas)||luas<=0){alert("Masukkan luas yang valid!");return;}
let harga = reg.a + reg.b * luas;
let txt = "Prediksi: Luas " + luas + " m2 = ";
txt += "Rp " + harga.toFixed(0) + " Juta";
txt += " | Y = " + reg.a.toFixed(2) + " + " + reg.b.toFixed(2) + " * " + luas;
document.getElementById("predResult").innerHTML = txt;
}
 
// Tampilkan metrik
document.getElementById("metrics").innerHTML = `
<div class="metric-box">
<div>Slope (b)</div>
<div class="val">${reg.b.toFixed(4)}</div>
</div>
<div class="metric-box">
<div>Intercept (a)</div>
<div class="val">${reg.a.toFixed(4)}</div>
</div>
<div class="metric-box">
<div>MSE</div>
<div class="val">${ev.mse.toFixed(2)}</div>
</div>
<div class="metric-box">
<div>RMSE</div>
<div class="val">${ev.rmse.toFixed(2)}</div>
</div>
<div class="metric-box">
<div>R-Squared (R2)</div>
<div class="val">${(ev.r2*100).toFixed(2)}%</div>
</div>`;
 
// Tabel dataset + nilai prediksi
let tHtml = "<tr><th>No</th><th>Luas (m2)</th>"
+ "<th>Harga Aktual</th><th>Harga Prediksi</th><th>Error</th></tr>";
data.forEach((d,i)=>{
let pred = reg.a + reg.b*d[0];
let error = Math.abs(d[1]-pred);
tHtml += `<tr><td>${i+1}</td><td>${d[0]}</td>
<td>${d[1]}</td><td>${pred.toFixed(1)}</td>
<td>${error.toFixed(1)}</td></tr>`;
});
document.getElementById("dataTable").innerHTML = tHtml;
 
drawChart(reg.a, reg.b);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deteksi Wajah AI</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:"Times New Roman", serif;
    background:#f4ecd8;
    color:#3e2f1c;
    padding:20px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
}

/* NAVBAR */
.navbar{
    background:#5c4033;
    padding:15px;
    border-radius:8px;
    text-align:center;
    margin-bottom:20px;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

.navbar a:hover{
    text-decoration:underline;
}

/* TITLE */
.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    font-size:38px;
    color:#5c4033;
    margin-bottom:10px;
}

.title p{
    font-size:18px;
    color:#6d4c41;
}

/* VIDEO AREA */
.video-container{
    position:relative;
    background:#fffaf0;
    border:2px solid #c2a27c;
    border-radius:12px;
    padding:15px;

    box-shadow:4px 4px 10px rgba(0,0,0,0.15);
}

video{
    width:100%;
    border-radius:10px;
    border:2px solid #c2a27c;
}

canvas{
    position:absolute;
    top:15px;
    left:15px;
}

/* INFO PANEL */
.info-panel{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:#fffaf0;
    border:2px solid #c2a27c;
    border-radius:10px;
    padding:20px;
    text-align:center;

    box-shadow:4px 4px 10px rgba(0,0,0,0.15);
}

.card h2{
    margin-bottom:10px;
    color:#5c4033;
}

.value{
    font-size:30px;
    font-weight:bold;
}

/* COLORS */
.green{
    color:#1b5e20;
}

.blue{
    color:#0d47a1;
}

.red{
    color:#b71c1c;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:25px;
    color:#6d4c41;
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

    <!-- NAVBAR -->
    <div class="navbar">

        <a href="index.html">
            Beranda
        </a>

    </div>

    <!-- TITLE -->
    <div class="title">

        <h1>Deteksi Wajah AI</h1>

        <p>
            Face Detection • Landmark • Ekspresi • Umur • Gender
        </p>

    </div>

    <!-- VIDEO -->
    <div class="video-container">

        <video
            id="video"
            autoplay
            muted
        ></video>

        <canvas id="overlay"></canvas>

    </div>

    <!-- INFO -->
    <div class="info-panel">

        <div class="card">

            <h2>Status Kamera</h2>

            <div
                class="value blue"
                id="cameraStatus"
            >
                AKTIF
            </div>

        </div>

        <div class="card">

            <h2>Jumlah Wajah</h2>

            <div
                class="value green"
                id="faceCount"
            >
                0
            </div>

        </div>

        <div class="card">

            <h2>Status Model AI</h2>

            <div
                class="value red"
                id="modelStatus"
            >
                LOADING...
            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">

        © Rifky Septiari Wibowo

    </div>

</div>

<script>

// ================= ELEMENT =================

const video =
document.getElementById("video");

const canvas =
document.getElementById("overlay");

const faceCount =
document.getElementById("faceCount");

const modelStatus =
document.getElementById("modelStatus");

// ================= LOAD MODEL =================

async function loadModels(){

    const MODEL_URL =
    "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";

    await faceapi.nets.ssdMobilenetv1
    .loadFromUri(MODEL_URL);

    await faceapi.nets.faceLandmark68Net
    .loadFromUri(MODEL_URL);

    await faceapi.nets.faceRecognitionNet
    .loadFromUri(MODEL_URL);

    await faceapi.nets.faceExpressionNet
    .loadFromUri(MODEL_URL);

    await faceapi.nets.ageGenderNet
    .loadFromUri(MODEL_URL);

    modelStatus.innerText = "SIAP";

}

// ================= AKSES KAMERA =================

navigator.mediaDevices.getUserMedia({
    video:true
})

.then(stream=>{

    video.srcObject = stream;

})

.catch(err=>{

    alert("Kamera gagal diakses");

    console.log(err);

});

// ================= DETEKSI WAJAH =================

async function detectFaces(source){

    const detections = await faceapi

    .detectAllFaces(
        source,
        new faceapi.SsdMobilenetv1Options()
    )

    .withFaceLandmarks()

    .withFaceExpressions()

    .withAgeAndGender();

    return detections;
}

// ================= GAMBAR HASIL =================

function drawResults(
    canvas,
    detections,
    displaySize
){

    const resized =
    faceapi.resizeResults(
        detections,
        displaySize
    );

    faceapi.draw.drawDetections(
        canvas,
        resized
    );

    faceapi.draw.drawFaceLandmarks(
        canvas,
        resized
    );

    faceapi.draw.drawFaceExpressions(
        canvas,
        resized
    );

    resized.forEach(d=>{

        const age =
        Math.round(d.age);

        const gender =
        d.gender;

        const prob =
        Math.round(
            d.genderProbability * 100
        );

        const label =
        age +
        " thn | " +
        gender +
        " (" +
        prob +
        "%)";

        new faceapi.draw.DrawTextField(

            [label],

            d.detection.box.topLeft

        ).draw(canvas);

    });

}

// ================= LOOP DETEKSI =================

async function detectLoop(){

    const detections =
    await detectFaces(video);

    faceCount.innerText =
    detections.length;

    const displaySize = {

        width:video.videoWidth,

        height:video.videoHeight
    };

    faceapi.matchDimensions(
        canvas,
        displaySize
    );

    canvas
    .getContext("2d")
    .clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawResults(
        canvas,
        detections,
        displaySize
    );

    requestAnimationFrame(
        detectLoop
    );
}

// ================= START =================

video.addEventListener("play", ()=>{

    detectLoop();

});

loadModels();

</script>

</body>
</html>

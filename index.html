<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praktikum AI</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body */
body{
    font-family: "Times New Roman", serif;
    background:#f4ecd8;
    color:#3e2f1c;
}

/* Navbar */
.navbar{
    background:#5c4033;
    color:#fdf6e3;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-bottom:4px solid #3e2f1c;
}

/* Menu */
.menu{
    background:#7b5e57;
    text-align:center;
    padding:12px;
}

.menu a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-size:18px;
}

.menu a:hover{
    text-decoration:underline;
}

/* Hero */
.hero{
    text-align:center;
    padding:70px 20px;
    background:#ede0c8;
    border-bottom:2px solid #b08968;
}

.hero h1{
    font-size:42px;
    margin-bottom:15px;
    color:#5c4033;
}

.hero p{
    font-size:20px;
    color:#6d4c41;
}

/* Container */
.container{
    width:90%;
    max-width:1100px;
    margin:40px auto;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
}

/* Card */
.card{
    background:#fffaf0;
    border:2px solid #c2a27c;
    border-radius:10px;
    padding:25px;
    text-align:center;

    box-shadow:4px 4px 10px rgba(0,0,0,0.15);

    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

/* Card Title */
.card h3{
    color:#5c4033;
    margin-bottom:20px;
    font-size:24px;
}

/* Button */
.card a{
    display:inline-block;
    text-decoration:none;
    background:#5c4033;
    color:white;
    padding:10px 18px;
    border-radius:5px;
    font-size:16px;
}

.card a:hover{
    background:#3e2f1c;
}

/* Footer */
.footer{
    background:#5c4033;
    color:#fdf6e3;
    text-align:center;
    padding:20px;
    margin-top:40px;
    border-top:4px solid #3e2f1c;
}

</style>
</head>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediksi Nilai Siswa - Regresi Linear</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:"Times New Roman", serif;
    background:#f4ecd8;
    color:#3e2f1c;
    padding:20px;
}

/* NAVBAR */
.navbar{
    background:#5c4033;
    padding:15px;
    border-radius:8px;
    text-align:center;
    margin-bottom:20px;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

.navbar a:hover{
    text-decoration:underline;
}

/* TITLE */
h1{
    text-align:center;
    color:#5c4033;
    margin-bottom:25px;
}

/* CARD */
.card{
    background:#fffaf0;
    border:2px solid #c2a27c;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;

    box-shadow:4px 4px 10px rgba(0,0,0,0.15);
}

/* SUBTITLE */
h2{
    color:#5c4033;
    margin-bottom:15px;
}

/* CANVAS */
canvas{
    width:100%;
    border:2px solid #c2a27c;
    border-radius:8px;
    background:white;
}

/* INPUT */
.input-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

input[type=number]{
    padding:10px;
    border:2px solid #7b5e57;
    border-radius:6px;
    width:180px;
    font-size:15px;
}

/* BUTTON */
button{
    background:#5c4033;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#3e2f1c;
}

/* RESULT */
.result{
    background:#f3e5d0;
    border-left:5px solid #5c4033;
    padding:15px;
    margin-top:15px;
    border-radius:6px;

    font-size:18px;
    line-height:1.6;
}

/* METRICS */
.metrics{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.metric-box{
    background:#f9f3e8;
    border-left:5px solid #5c4033;
    padding:12px;
    border-radius:6px;

    flex:1;
    min-width:150px;
}

.metric-box .label{
    font-size:14px;
}

.metric-box .val{
    font-size:22px;
    font-weight:bold;
    color:#5c4033;
    margin-top:5px;
}

/* TABLE */
.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#5c4033;
    color:white;
    padding:10px;
}

td{
    border:1px solid #c2a27c;
    padding:8px;
    text-align:center;
}

tr:nth-child(even){
    background:#f3e5d0;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Beranda</a>
</div>

<!-- TITLE -->
<h1>Prediksi Nilai Siswa dengan Regresi Linear</h1>

<!-- CHART -->
<div class="card">

    <h2>Grafik Regresi</h2>

    <canvas id="chart" width="800" height="400"></canvas>

</div>

<!-- PREDICTION -->
<div class="card">

    <h2>Prediksi Nilai Berdasarkan Jam Belajar</h2>

    <div class="input-box">

        <input
            type="number"
            id="inputX"
            value="5"
            step="0.5"
        >

        <button onclick="predict()">
            Prediksi
        </button>

    </div>

    <div id="predResult" class="result">
        Hasil prediksi akan tampil di sini
    </div>

</div>

<!-- METRICS -->
<div class="card">

    <h2>Evaluasi Model</h2>

    <div id="metrics" class="metrics"></div>

</div>

<!-- TABLE -->
<div class="card">

    <h2>Dataset dan Hasil Prediksi</h2>

    <div class="table-wrapper">

        <table id="dataTable"></table>

    </div>

</div>

<script>

// DATASET
const data = [

[1,45],
[2,52],
[3,61],
[5,70],
[6,78],
[8,85],
[10,92],
[12,98]

];

// REGRESI LINEAR
function linearRegression(data){

    let n = data.length;

    let sx =
    data.reduce((s,d)=>s+d[0],0);

    let sy =
    data.reduce((s,d)=>s+d[1],0);

    let sxy =
    data.reduce((s,d)=>s+d[0]*d[1],0);

    let sx2 =
    data.reduce((s,d)=>s+d[0]*d[0],0);

    let b =
    (n*sxy - sx*sy) /
    (n*sx2 - sx*sx);

    let a =
    (sy - b*sx) / n;

    return {a,b};

}

// EVALUASI
function evaluate(data,a,b){

    let n = data.length;

    let yMean =
    data.reduce((s,d)=>s+d[1],0) / n;

    let ssRes =
    data.reduce((s,d)=>
    s + Math.pow(d[1]-(a+b*d[0]),2),0);

    let ssTot =
    data.reduce((s,d)=>
    s + Math.pow(d[1]-yMean,2),0);

    let mse = ssRes / n;

    let r2 = 1 - (ssRes/ssTot);

    return {

        mse,
        rmse:Math.sqrt(mse),
        r2

    };

}

// MODEL
const reg = linearRegression(data);

const ev = evaluate(
    data,
    reg.a,
    reg.b
);

// DRAW CHART
function drawChart(a,b,highlightX=null){

    const canvas =
    document.getElementById("chart");

    const ctx =
    canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;

    const pad = 60;

    const xMax = 15;
    const yMax = 110;

    const sx = (x)=>

    pad + (x/xMax)*(W-2*pad);

    const sy = (y)=>

    H-pad - (y/yMax)*(H-2*pad);

    ctx.clearRect(0,0,W,H);

    // Background
    ctx.fillStyle="#fffaf0";
    ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle="#ddd";

    for(let i=0;i<=10;i++){

        let y = i*10;

        ctx.beginPath();

        ctx.moveTo(pad,sy(y));
        ctx.lineTo(W-pad,sy(y));

        ctx.stroke();

    }

    // Axis
    ctx.strokeStyle="#5c4033";
    ctx.lineWidth=2;

    ctx.beginPath();

    ctx.moveTo(pad,pad);
    ctx.lineTo(pad,H-pad);
    ctx.lineTo(W-pad,H-pad);

    ctx.stroke();

    // Regression Line
    ctx.strokeStyle="#8b5e3c";
    ctx.lineWidth=3;

    ctx.beginPath();

    ctx.moveTo(sx(0), sy(a));

    ctx.lineTo(
        sx(xMax),
        sy(a+b*xMax)
    );

    ctx.stroke();

    // Data Points
    data.forEach(d=>{

        ctx.beginPath();

        ctx.arc(
            sx(d[0]),
            sy(d[1]),
            6,
            0,
            Math.PI*2
        );

        ctx.fillStyle="#5c4033";

        ctx.fill();

    });

    // Highlight prediction
    if(highlightX !== null){

        let py =
        a + b*highlightX;

        ctx.beginPath();

        ctx.arc(
            sx(highlightX),
            sy(py),
            8,
            0,
            Math.PI*2
        );

        ctx.fillStyle="red";

        ctx.fill();

    }

}

// PREDICT
function predict(){

    let x = parseFloat(
        document.getElementById("inputX").value
    );

    if(isNaN(x)) return;

    let y =
    reg.a + reg.b*x;

    if(y > 100){
        y = 100;
    }

    document.getElementById("predResult").innerHTML =

    "<b>Prediksi Nilai:</b> " +
    y.toFixed(2) +

    "<br><br>" +

    "Persamaan Regresi:<br>" +

    "Y = " +
    reg.a.toFixed(4) +

    " + (" +
    reg.b.toFixed(4) +

    " × " +
    x +
    ")";

    drawChart(reg.a, reg.b, x);

}

// METRICS
document.getElementById("metrics").innerHTML =

`
<div class="metric-box">
    <div class="label">MSE</div>
    <div class="val">${ev.mse.toFixed(4)}</div>
</div>

<div class="metric-box">
    <div class="label">RMSE</div>
    <div class="val">${ev.rmse.toFixed(4)}</div>
</div>

<div class="metric-box">
    <div class="label">R²</div>
    <div class="val">${(ev.r2*100).toFixed(2)}%</div>
</div>

<div class="metric-box">
    <div class="label">Slope (b)</div>
    <div class="val">${reg.b.toFixed(4)}</div>
</div>

<div class="metric-box">
    <div class="label">Intercept (a)</div>
    <div class="val">${reg.a.toFixed(4)}</div>
</div>
`;

// TABLE
let tHtml =

"<tr>" +
"<th>No</th>" +
"<th>Jam Belajar</th>" +
"<th>Nilai Aktual</th>" +
"<th>Prediksi</th>" +
"<th>Error</th>" +
"</tr>";

data.forEach((d,i)=>{

    let p =
    reg.a + reg.b*d[0];

    tHtml +=

    `<tr>
        <td>${i+1}</td>
        <td>${d[0]} Jam</td>
        <td>${d[1]}</td>
        <td>${p.toFixed(2)}</td>
        <td>${Math.abs(d[1]-p).toFixed(2)}</td>
    </tr>`;

});

document.getElementById("dataTable").innerHTML =
tHtml;

// DRAW
drawChart(reg.a, reg.b);

predict();

</script>

</body>
</html>
